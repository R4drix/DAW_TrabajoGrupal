services:
  - type: web
    name: catagaclub-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "cd CatagaClub && gunicorn CatagaClub.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "catagaclub-api.onrender.com,localhost,127.0.0.1"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS_EXTRA
        value: "https://cataga-club-frontend.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: catagaclub-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.7"

databases:
  - name: catagaclub-db
    plan: free
    databaseName: catagaclub
    user: catagaclub
