{% extends 'club/base.html' %}
{% block title %}Confirmar eliminación{% endblock %}
{% block content %}
<div class="card p-4 border-danger">
    <h3 class="text-danger">¿Eliminar este registro?</h3>
    <p class="text-muted">Esta acción no se puede deshacer.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-link">Cancelar</a>
    </form>
</div>
{% endblock %}
