<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Eliminación</title>
</head>
<body>
    <h1>¿Seguro que deseas eliminar la Habitación {{ object.numero }}?</h1>
    <p>Esta acción no se puede deshacer en el sistema de Cataga Club.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, Confirmar Eliminación</button>
    </form>
    <br>
    <a href="{% url 'wellness:lista' %}">❌ Cancelar</a>
</body>
</html>
