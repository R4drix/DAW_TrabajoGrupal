<section class="seccion-habitaciones">
  <div class="encabezado-pagina">
    <div class="etiqueta-oro">Tu Experiencia Cátaga</div>
    <h1 class="titulo-pagina">Nuestras Habitaciones y Suites</h1>
    <!-- <p class="subtitulo-pagina"> -->
    <!--   Datos en vivo desde la API del backend (<code>/club/api/estado/</code>). -->
    <!-- </p> -->
  </div>
  @if (loading()) {
    <div class="alert alert-info">Cargando habitaciones desde el servidor...</div>
    <div class="alert alert-danger">{{errorMsg}}</div>
  } @else {
    @if (destacadas.length > 0) {
      <div class="galeria-destacada">
        @for (h of destacadas; track h.id) {
          <div class="foto-destacada">
            <img
              [src]="imagenDe(h)"
              [alt]="'Habitación ' + h.numero + ' - ' + h.tipo"
              loading="lazy"
              (error)="onImgError($event)"
            />
            <div class="foto-destacada-info">
              <span class="foto-destacada-tipo">{{ h.tipo }}</span>
              <span class="foto-destacada-numero">Hab. #{{ h.numero }}</span>
            </div>
          </div>
        }
      </div>
    } @else {
      <div class="alert alert-secondary">No hay habitaciones para mostrar.</div>
    }
  }
</section>
